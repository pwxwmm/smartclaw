<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartClaw</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --text-primary: #e2e8f0;
      --accent: #ed8936;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    #loading svg { opacity: 0.9; }
    #loading .brand {
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
    }
    #app-frame {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
      <ellipse cx="16" cy="19" rx="9" ry="10" fill="currentColor" opacity=".85"/>
      <path d="M7 6l4 9M25 6l-4 9" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="12" cy="16" r="3" fill="#ed8936"/>
      <circle cx="20" cy="16" r="3" fill="#ed8936"/>
      <circle cx="12" cy="16" r="1.5" fill="#0d0d1a"/>
      <circle cx="20" cy="16" r="1.5" fill="#0d0d1a"/>
      <path d="M15 20l1 3 1-3" fill="#ed8936"/>
    </svg>
    <span class="brand">SmartClaw</span>
  </div>

  <script src="wailsjs/runtime.js"></script>
  <script>
    (function() {
      const bridge = window.runtime || {};

      async function init() {
        try {
          if (bridge.invoke) {
            await bridge.invoke('Startup', {});
          }
        } catch(e) {
          console.warn('Bridge init:', e);
        }

        const loading = document.getElementById('loading');
        loading.style.display = 'none';

        document.body.innerHTML = '';
        document.body.innerHTML = `
          <div id="desktop-app" style="width:100%;height:100vh;display:flex;flex-direction:column;">
            <div id="sidebar-slot" style="width:260px;min-width:200px;background:#0f172a;overflow-y:auto;border-right:1px solid #1e293b;">
            </div>
            <div id="main-slot" style="flex:1;display:flex;flex-direction:column;min-width:0;">
              <div id="chat-slot" style="flex:1;overflow-y:auto;padding:16px;"></div>
              <div id="input-slot" style="padding:8px 16px;border-top:1px solid #1e293b;">
                <div style="display:flex;gap:8px;align-items:flex-end;">
                  <textarea id="desktop-input" rows="1" placeholder="Ask me anything..." style="flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:14px;resize:none;outline:none;max-height:120px;"></textarea>
                  <button id="desktop-send" style="background:#ed8936;color:#0f172a;border:none;border-radius:8px;padding:10px 16px;cursor:pointer;font-weight:600;">Send</button>
                </div>
              </div>
            </div>
          </div>
        `;

        const input = document.getElementById('desktop-input');
        const sendBtn = document.getElementById('desktop-send');
        const chatSlot = document.getElementById('chat-slot');

        function appendMessage(role, text) {
          const div = document.createElement('div');
          div.style.cssText = 'margin-bottom:12px;padding:10px 14px;border-radius:8px;max-width:85%;' +
            (role === 'user' ? 'background:#1e293b;margin-left:auto;' : 'background:#1a1a2e;');
          const label = document.createElement('div');
          label.style.cssText = 'font-size:11px;font-weight:600;margin-bottom:4px;color:' +
            (role === 'user' ? '#ed8936' : '#a78bfa;');
          label.textContent = role === 'user' ? 'You' : 'SmartClaw';
          const content = document.createElement('div');
          content.style.cssText = 'font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;';
          content.textContent = text;
          div.appendChild(label);
          div.appendChild(content);
          chatSlot.appendChild(div);
          chatSlot.scrollTop = chatSlot.scrollHeight;
        }

        async function sendPrompt() {
          const text = input.value.trim();
          if (!text) return;
          input.value = '';
          input.style.height = 'auto';
          appendMessage('user', text);

          try {
            const result = await bridge.invoke('SendPrompt', text);
            appendMessage('assistant', result || '(empty response)');
          } catch(e) {
            appendMessage('assistant', 'Error: ' + (e.message || e));
          }
        }

        sendBtn.addEventListener('click', sendPrompt);
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendPrompt();
          }
        });
        input.addEventListener('input', function() {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        appendMessage('assistant', 'Welcome to SmartClaw Desktop! How can I help you today?');
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
