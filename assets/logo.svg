<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbd38d"/>
      <stop offset="60%" style="stop-color:#ed8936"/>
      <stop offset="100%" style="stop-color:#c05621"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="45%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="eyeShine">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="beakGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936"/>
      <stop offset="100%" style="stop-color:#c05621"/>
    </linearGradient>
    <linearGradient id="chestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="40%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#a0aec0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0f172a" opacity="0.95"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#4a5568" stroke-width="1.5" opacity="0.5"/>

  <!-- Left wing -->
  <path d="M 120 220 Q 80 280 100 360 Q 130 340 160 300 Q 170 260 155 230 Z" fill="url(#wingGrad)" filter="url(#softShadow)"/>
  <path d="M 130 240 Q 100 290 110 350 Q 130 335 150 305 Q 158 270 148 248 Z" fill="#2d3748" opacity="0.6"/>

  <!-- Right wing -->
  <path d="M 392 220 Q 432 280 412 360 Q 382 340 352 300 Q 342 260 357 230 Z" fill="url(#wingGrad)" filter="url(#softShadow)"/>
  <path d="M 382 240 Q 412 290 402 350 Q 382 335 362 305 Q 354 270 364 248 Z" fill="#2d3748" opacity="0.6"/>

  <!-- Body -->
  <ellipse cx="256" cy="310" rx="100" ry="120" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Chest feather pattern -->
  <ellipse cx="256" cy="330" rx="55" ry="75" fill="url(#chestGrad)" opacity="0.35"/>
  <path d="M 220 280 Q 256 310 292 280" fill="none" stroke="#a0aec0" stroke-width="0.8" opacity="0.3"/>
  <path d="M 215 300 Q 256 335 297 300" fill="none" stroke="#a0aec0" stroke-width="0.8" opacity="0.3"/>
  <path d="M 212 320 Q 256 360 300 320" fill="none" stroke="#a0aec0" stroke-width="0.8" opacity="0.3"/>
  <path d="M 215 340 Q 256 375 297 340" fill="none" stroke="#a0aec0" stroke-width="0.8" opacity="0.3"/>

  <!-- Ear tufts -->
  <path d="M 190 170 L 175 110 L 210 155 Z" fill="#2d3748"/>
  <path d="M 193 165 L 182 120 L 207 158 Z" fill="#4a5568" opacity="0.4"/>
  <path d="M 322 170 L 337 110 L 302 155 Z" fill="#2d3748"/>
  <path d="M 319 165 L 330 120 L 305 158 Z" fill="#4a5568" opacity="0.4"/>

  <!-- Head -->
  <ellipse cx="256" cy="195" rx="85" ry="70" fill="url(#bodyGrad)" filter="url(#softShadow)"/>

  <!-- Facial disc -->
  <ellipse cx="256" cy="200" rx="75" ry="60" fill="#1a202c" opacity="0.4"/>
  <path d="M 185 200 Q 256 155 327 200 Q 256 225 185 200 Z" fill="#2d3748" opacity="0.5"/>

  <!-- Left eye socket -->
  <circle cx="225" cy="190" r="26" fill="#1a1a2e"/>
  <circle cx="225" cy="190" r="24" fill="url(#eyeGlow)" filter="url(#eyeShine)"/>
  <circle cx="225" cy="190" r="14" fill="url(#irisGrad)"/>
  <circle cx="225" cy="190" r="7" fill="#000"/>
  <circle cx="219" cy="184" r="3.5" fill="#fff" opacity="0.85"/>
  <circle cx="230" cy="195" r="1.5" fill="#fff" opacity="0.4"/>

  <!-- Right eye socket -->
  <circle cx="287" cy="190" r="26" fill="#1a1a2e"/>
  <circle cx="287" cy="190" r="24" fill="url(#eyeGlow)" filter="url(#eyeShine)"/>
  <circle cx="287" cy="190" r="14" fill="url(#irisGrad)"/>
  <circle cx="287" cy="190" r="7" fill="#000"/>
  <circle cx="281" cy="184" r="3.5" fill="#fff" opacity="0.85"/>
  <circle cx="292" cy="195" r="1.5" fill="#fff" opacity="0.4"/>

  <!-- Brow ridge -->
  <path d="M 200 172 Q 225 163 250 172" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>
  <path d="M 262 172 Q 287 163 312 172" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round"/>

  <!-- Beak -->
  <path d="M 248 208 L 256 228 L 264 208 Z" fill="url(#beakGrad)"/>
  <path d="M 250 210 L 256 222 L 262 210 Z" fill="#ed8936" opacity="0.3"/>

  <!-- Talons -->
  <g transform="translate(210, 420)" opacity="0.9">
    <path d="M 0 0 Q -8 12 -4 18 Q 0 14 4 18 Q 8 12 0 0 Z" fill="#ed8936"/>
    <path d="M 20 0 Q 12 12 16 18 Q 20 14 24 18 Q 28 12 20 0 Z" fill="#ed8936"/>
  </g>
  <g transform="translate(270, 420)" opacity="0.9">
    <path d="M 0 0 Q -8 12 -4 18 Q 0 14 4 18 Q 8 12 0 0 Z" fill="#ed8936"/>
    <path d="M 20 0 Q 12 12 16 18 Q 20 14 24 18 Q 28 12 20 0 Z" fill="#ed8936"/>
  </g>

  <!-- Subtle claw accent marks on belly -->
  <path d="M 240 380 L 236 395" stroke="#ed8936" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 256 383 L 256 398" stroke="#ed8936" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 272 380 L 276 395" stroke="#ed8936" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
</svg>
